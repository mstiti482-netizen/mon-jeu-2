<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Collector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }

        #gameContainer {
            position: relative;
            width: 600px;
            height: 400px;
            background-color: #1a1a1a;
            border: 3px solid #667eea;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #player {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: #00ff00;
            border-radius: 5px;
            bottom: 10px;
            left: 10px;
        }

        .box {
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: #ffff00;
            border-radius: 3px;
        }

        #score {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ff00;
            font-size: 20px;
            z-index: 10;
            font-weight: bold;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.9);
            color: #00ff00;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            display: none;
            z-index: 20;
            border: 2px solid #00ff00;
        }

        #gameOver h1 {
            margin-bottom: 10px;
            font-size: 32px;
        }

        #gameOver p {
            margin-bottom: 20px;
            font-size: 18px;
        }

        #gameOver button {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #gameOver button:hover {
            background-color: #764ba2;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="score">Score: 0</div>
        <div id="player"></div>
        <div id="gameOver">
            <h1>Game Over!</h1>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script>
        const gameContainer = document.getElementById('gameContainer');
        const player = document.getElementById('player');
        const scoreDisplay = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');

        let score = 0;
        let gameActive = true;
        let playerX = 10;
        let playerY = gameContainer.offsetHeight - 40;
        const playerSpeed = 5;
        const playerSize = 30;

        const keys = {};

        // Keyboard controls
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Mouse controls
        gameContainer.addEventListener('mousemove', (e) => {
            const rect = gameContainer.getBoundingClientRect();
            playerX = e.clientX - rect.left - playerSize / 2;
            playerX = Math.max(0, Math.min(playerX, gameContainer.offsetWidth - playerSize));
        });

        function updatePlayer() {
            if (keys['ArrowLeft'] || keys['a']) {
                playerX -= playerSpeed;
            }
            if (keys['ArrowRight'] || keys['d']) {
                playerX += playerSpeed;
            }

            playerX = Math.max(0, Math.min(playerX, gameContainer.offsetWidth - playerSize));
            player.style.left = playerX + 'px';
            player.style.top = playerY + 'px';
        }

        function createBox() {
            if (!gameActive) return;

            const box = document.createElement('div');
            box.className = 'box';
            const randomX = Math.random() * (gameContainer.offsetWidth - 25);
            box.style.left = randomX + 'px';
            box.style.top = '0px';
            gameContainer.appendChild(box);

            let boxY = 0;
            const boxSpeed = 2 + Math.random() * 2;

            const boxInterval = setInterval(() => {
                if (!gameActive) {
                    clearInterval(boxInterval);
                    box.remove();
                    return;
                }

                boxY += boxSpeed;
                box.style.top = boxY + 'px';

                // Check collision with player
                if (
                    boxY + 25 >= playerY &&
                    boxY <= playerY + playerSize &&
                    parseFloat(box.style.left) + 25 >= playerX &&
                    parseFloat(box.style.left) <= playerX + playerSize
                ) {
                    score++;
                    scoreDisplay.textContent = 'Score: ' + score;
                    box.remove();
                    clearInterval(boxInterval);
                }

                // Box fell off screen
                if (boxY > gameContainer.offsetHeight) {
                    box.remove();
                    clearInterval(boxInterval);
                    endGame();
                }
            }, 30);
        }

        function endGame() {
            gameActive = false;
            finalScoreDisplay.textContent = score;
            gameOverScreen.style.display = 'block';
        }

        function gameLoop() {
            updatePlayer();
            requestAnimationFrame(gameLoop);
        }

        // Start creating boxes
        setInterval(() => {
            if (gameActive) {
                createBox();
            }
        }, 800);

        gameLoop();
    </script>
</body>
</html>
